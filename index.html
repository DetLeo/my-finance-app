<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>我的財務</title>
    <style>
      :root {
        --sage: #5C6E52; --sage-dark: #4a5942;
        --bg: #f2f0eb; --card: #ffffff;
        --red: #c0392b; --gold: #b5873a; --blue: #3a6b8a; --purple: #7a5a8a;
        --text: #333; --text2: #555; --sub: #888; --sub2: #aaa; --faint: #bbb;
        --line: #f0ede8; --tabbg: #e8e5df; --track: #e0ddd7;
        --input: #ffffff; --inputborder: #ddd; --btn-muted: #eee;
        --green-soft: #e8f0e5; --red-soft: #fde8e5; --gold-soft: #f5ede0;
        --purple-soft: #f0ecf5; --blue-soft: #e5eef5; --pill: #eef2ea;
        --sage-22: #dde5d8; --sage-44: #bccab3;
        --nav-bg: rgba(255,255,255,0.95);
        --shadow: 0 2px 12px rgba(0,0,0,0.06);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --sage: #8aa578; --sage-dark: #4a5942;
          --bg: #191917; --card: #232320;
          --red: #e07b6d; --gold: #cfa25e; --blue: #6f9dbd; --purple: #a887bd;
          --text: #e6e4de; --text2: #c9c7c0; --sub: #8f8d86; --sub2: #757369; --faint: #5f5d55;
          --line: #32322e; --tabbg: #2c2c28; --track: #3a3a35;
          --input: #2e2e2a; --inputborder: #44443e; --btn-muted: #3a3a35;
          --green-soft: #2a352a; --red-soft: #3d2926; --gold-soft: #3a3226;
          --purple-soft: #322a38; --blue-soft: #263038; --pill: #2a302a;
          --sage-22: #2e352b; --sage-44: #3d4a38;
          --nav-bg: rgba(30,30,28,0.95);
          --shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/my-finance-app/sw.js');
        });
      }
    </script>
  </body>
</html>
