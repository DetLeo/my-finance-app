    <title>我的財務</title>
    <style>
      :root {
        --sage: #5C6E52; --sage-dark: #4a5942;
        --bg: #faf8f4; --card: #ffffff;
        --red: #c0392b; --gold: #b5873a; --blue: #3a6b8a; --purple: #7a5a8a;

        --sage-22: #dfe6d9; --sage-44: #c2cfb8;
        --nav-bg: rgba(255,255,255,0.95);
        --card-border: 1px solid #eceade;
        --card-top: 1px solid #eceade;
        --shadow: none;
        --hero-grad: linear-gradient(135deg, #4a5942 0%, #5C6E52 100%);
        --hero-top: 1px solid transparent;
        --gold-text-grad: none;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --sage: #d4b483; --sage-dark: #8a7347;
          --bg: #0f0f0e; --card: #1f1f1d;
          --red: #e08578; --gold: #d4b483; --blue: #8fa8b8; --purple: #a89bb5;
          --text: #ebe8e2; --text2: #cfccc4; --sub: #96938a; --sub2: #79766d; --faint: #5e5c54;
          --line: #30302c; --tabbg: #2b2b28; --track: #3a3a35;
          --input: #2b2b28; --inputborder: #45453f; --btn-muted: #383834;
          --green-soft: #33302a; --red-soft: #3d2a26; --gold-soft: #383226;
          --purple-soft: #322e38; --blue-soft: #2a3138; --pill: #33302a;
          --sage-22: #363126; --sage-44: #55492f;
          --nav-bg: rgba(28,28,26,0.95);
          --card-border: 1px solid #2d2d29;
          --card-top: 1px solid #3a3a34;
          --shadow: none;
          --hero-grad: linear-gradient(150deg, #23211c 0%, #3a3324 55%, #2a2620 100%);

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-variant-numeric: tabular-nums; }
      html, body, #root {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--bg);
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-e04385dc.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
